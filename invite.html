<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOP SECRET</title>

<style>
  body {
    margin: 0;
    background: black;
    color: #00ffcc;
    font-family: "Courier New", monospace;
    overflow: hidden;
  }

  .scanlines::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,255,200,0.05),
      rgba(0,255,200,0.05) 2px,
      transparent 2px,
      transparent 4px
    );
    pointer-events: none;
  }

  .center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 90%;
  }

  h1 {
    font-size: 36px;
    animation: glitch 1s infinite;
  }

  @media (min-width: 768px) {
    h1 { font-size: 48px; }
  }

  @keyframes glitch {
    0% { text-shadow: 2px 0 red, -2px 0 blue; }
    50% { text-shadow: -2px 0 red, 2px 0 blue; }
    100% { text-shadow: 2px 0 red, -2px 0 blue; }
  }

  .blink { animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .terminal {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 10px;
    font-size: 12px;
  }

  .hidden { opacity: 0; }
  .reveal { animation: fadeIn 3s forwards; }
  @keyframes fadeIn { to { opacity: 1; } }

  .warning {
    color: red;
    font-size: 16px;
    margin-top: 20px;
    animation: glitch 0.5s infinite;
  }

  .eye {
    position: fixed;
    width: 40px;
    opacity: 0.05;
    animation: moveEye 10s infinite linear;
  }

  @keyframes moveEye {
    0% { top: 10%; left: 10%; }
    25% { top: 80%; left: 20%; }
    50% { top: 50%; left: 80%; }
    75% { top: 20%; left: 60%; }
    100% { top: 10%; left: 10%; }
  }

</style>
</head>

<body class="scanlines">

<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Eye_of_Providence.png" class="eye">

<div class="center">
  <h1>TOP SECRET</h1>
  <p id="name"></p>
  <p class="blink">ДОСТУП РАЗРЕШЁН</p>
  <p class="hidden" id="invite">
    Вы были выбраны.<br><br>
    Это не совпадение.<br>
    Они наблюдали за вами.<br><br>
    Тема встречи:<br>
    РЕПТИЛОИДЫ / МАСОНЫ / НЕСУЩЕСТВУЮЩИЕ СТРАНЫ
  </p>
  <p class="warning hidden" id="warn">НЕ ОГЛЯДЫВАЙСЯ</p>
</div>

<div class="terminal" id="terminal"></div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "АГЕНТ";
document.getElementById("name").innerText = name + ", ДОСТУП ПОДТВЕРЖДЁН.";

// секретный код
if (params.get("code") === "777") {
  document.body.innerHTML += "<div style='position:fixed;top:10px;right:10px;color:red;'>СКРЫТЫЙ КАНАЛ АКТИВЕН</div>";
}

// терминал
const terminal = document.getElementById("terminal");
const lines = [
  "[INIT] попытка подключения...",
  "[OK] масонские протоколы обойдены",
  "[OK] сигнал перехвачен",
  "[WARN] кто-то смотрит",
  "[DATA] координаты скрыты",
  "[???] они рядом"
];

let i = 0;
function typeLine() {
  if (i < lines.length) {
    terminal.innerHTML += lines[i] + "<br>";
    i++;
    setTimeout(typeLine, 800);
  }
}
setTimeout(typeLine, 1000);

// появление текста
setTimeout(() => {
  document.getElementById("invite").classList.add("reveal");
}, 4000);

setTimeout(() => {
  document.getElementById("warn").classList.add("reveal");
}, 7000);

// глюки
setInterval(() => {
  document.body.style.background = Math.random() > 0.97 ? "#001111" : "black";
}, 100);

// пасхалка: клики
let clicks = 0;
document.body.addEventListener("click", () => {
  clicks++;
  if (clicks === 5) {
    alert("ОНИ ЗАМЕТИЛИ ТЕБЯ");
  }
});

// пасхалка: клавиатура
let keys = "";
document.addEventListener("keydown", (e) => {
  keys += e.key;
  if (keys.includes("truth")) {
    document.body.innerHTML = "ИСТИНА СКРЫТА";
  }
});

</script>

</body>
</html>
