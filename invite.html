<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOP SECRET</title>
<style>
  body{margin:0;background:#000;color:#00ffcc;font-family:"Courier New",monospace;overflow:hidden}

  /* усиленный глич */
  h1{font-size:34px;position:relative;animation:glitch 0.6s infinite}
  @media(min-width:768px){h1{font-size:48px}}
  @keyframes glitch{
    0%{transform:translate(0)}
    20%{transform:translate(-2px,2px)}
    40%{transform:translate(-2px,-2px)}
    60%{transform:translate(2px,2px)}
    80%{transform:translate(2px,-2px)}
    100%{transform:translate(0)}
  }

  .glitch-layer::before,
  .glitch-layer::after{
    content:attr(data-text);
    position:absolute;
    left:0;
    width:100%;
    overflow:hidden;
  }
  .glitch-layer::before{
    color:red;
    animation:glitchTop 1s infinite linear;
  }
  .glitch-layer::after{
    color:blue;
    animation:glitchBot 1s infinite linear;
  }
  @keyframes glitchTop{0%{clip-path:inset(0 0 80% 0)}50%{clip-path:inset(0 0 20% 0)}100%{clip-path:inset(0 0 80% 0)}}
  @keyframes glitchBot{0%{clip-path:inset(80% 0 0 0)}50%{clip-path:inset(20% 0 0 0)}100%{clip-path:inset(80% 0 0 0)}}

  .scan::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(to bottom,rgba(0,255,200,.05),rgba(0,255,200,.05) 2px,transparent 2px,transparent 4px);pointer-events:none}

  .center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%;z-index:2}
  .blink{animation:blink 1s infinite}@keyframes blink{50%{opacity:0}}
  .terminal{position:absolute;bottom:0;width:100%;padding:10px;font-size:12px;z-index:2}
  .hidden{opacity:0}.reveal{animation:fade 3s forwards}@keyframes fade{to{opacity:1}}
  .warn{color:#f00;font-size:16px;margin-top:16px;animation:glitch .4s infinite}

  .overlay{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:10}

  .coords{margin-top:14px;font-size:14px;cursor:pointer}
  .cam-indicator{position:fixed;top:10px;left:10px;color:#0f0;font-size:12px;display:none;z-index:3}

  /* видео фон */
  video#bgcam{
    position:fixed;
    top:0;left:0;
    width:100vw;height:100vh;
    object-fit:cover;
    z-index:1;
    filter:contrast(120%) brightness(60%) hue-rotate(120deg);
    display:none;
  }

  .select-only{color:transparent}
  .select-only::selection{color:#0f0;background:#003333}
</style>
</head>
<body class="scan">

<!-- 404 -->
<div class="overlay" id="overlay">
  <div>
    <h1>404 NOT FOUND</h1>
    <p>ресурс не существует</p>
  </div>
</div>

<video id="bgcam" autoplay playsinline muted></video>

<div class="cam-indicator" id="camInd">● REC | CAMERA ACTIVE</div>

<div class="center" id="main" style="display:none">
  <h1 class="glitch-layer" data-text="TOP SECRET">TOP SECRET</h1>
  <p id="name"></p>
  <p class="blink">ДОСТУП РАЗРЕШЁН</p>

  <p class="hidden" id="invite">
    Вы были выбраны.<br><br>
    Они наблюдают.<br>
    Это не совпадение.<br>
  </p>

  <div class="coords" id="coords">[координаты зашифрованы]</div>

  <p class="warn hidden" id="warn">НЕ ОГЛЯДЫВАЙСЯ</p>

  <p class="select-only">пароль: 777</p>
</div>

<div class="terminal" id="terminal"></div>

<script>
const params=new URLSearchParams(location.search);
const name=params.get("name")||"АГЕНТ";

// 404 -> reveal
setTimeout(()=>{
  overlay.style.display="none";
  main.style.display="block";
},2000);

setTimeout(()=>{
  nameEl=document.getElementById("name");
  nameEl.innerText=name+", ДОСТУП ПОДТВЕРЖДЁН";
},2100);

// терминал
const term=document.getElementById("terminal");
const lines=["[INIT] подключение...","[OK] обход фильтров","[WARN] наблюдение активно","[DATA] координаты скрыты"];
let i=0;function t(){if(i<lines.length){term.innerHTML+=lines[i]+"<br>";i++;setTimeout(t,700)}}setTimeout(t,1200);

// reveal
setTimeout(()=>invite.classList.add("reveal"),4000);
setTimeout(()=>warn.classList.add("reveal"),6500);

// глюки
setInterval(()=>{
  document.body.style.transform=Math.random()>.96?"translate(2px,-2px)":"none";
},100);

// координаты
coords.onclick=()=>{
  navigator.clipboard.writeText("https://t.me/+bdAdyFXJZxg2ZTQy");
  coords.innerText="СКОПИРОВАНО";
}

// КАМЕРА
setTimeout(()=>{
  navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>{
      const video=document.getElementById("bgcam");
      video.srcObject=stream;
      video.style.display="block";
      document.getElementById("camInd").style.display="block";
    })
    .catch(()=>{
      console.log("доступ к камере отклонён");
    });
},5000);

// клики
let c=0;document.body.onclick=()=>{c++;if(c===5)alert("ОНИ ВИДЯТ ТЕБЯ")}

// клавиатура
let k="";document.addEventListener("keydown",e=>{
  k+=e.key;
  if(k.includes("truth")) document.body.innerHTML="ИСТИНА СКРЫТА";
});


// ЭФФЕКТ "СКРИНШОТА"
function fakeScreenshot(){
  const video = document.getElementById("bgcam");
  if(!video || video.style.display === "none") return;

  // вспышка
  const flash = document.createElement("div");
  flash.style.position = "fixed";
  flash.style.inset = "0";
  flash.style.background = "white";
  flash.style.opacity = "0.9";
  flash.style.zIndex = "999";
  document.body.appendChild(flash);

  setTimeout(()=>flash.remove(),150);

  // "снимок"
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  // сохранить как файл
  canvas.toBlob(blob=>{
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "capture.png";
    a.click();
  });

  // сообщение
  const msg = document.createElement("div");
  msg.innerText = "СНИМОК СОХРАНЕН";
  msg.style.position = "fixed";
  msg.style.bottom = "50px";
  msg.style.left = "50%";
  msg.style.transform = "translateX(-50%)";
  msg.style.color = "red";
  msg.style.zIndex = "999";
  document.body.appendChild(msg);
  setTimeout(()=>msg.remove(),2000);
}

// случайный запуск
setInterval(()=>{
  if(Math.random() > 0.98){
    fakeScreenshot();
  }
},3000);

</script>
</body>
</html>
